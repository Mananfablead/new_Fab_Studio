<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Fablead Studio</title>
        <link rel="icon" type="image/png" href="./public/favicon.ico" />
        <meta
            name="description"
            content="Fablead Studio - Creative Design & Media Platform"
        />

        <meta name="author" content="Fablead Studio" />

        <!-- Open Graph -->
        <meta property="og:title" content="Fablead Studio" />
        <meta
            property="og:description"
            content="Fablead Studio - Creative Design & Media Platform"
        />
        <meta property="og:type" content="website" />

        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:site" content="@fableadstudio" />
        <meta name="twitter:title" content="Fablead Studio" />
        <meta
            name="twitter:description"
            content="Fablead Studio - Creative Design & Media Platform"
        />
    </head>

    <body>
        <div id="root"></div>
        <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
        <script type="module" src="/src/main.tsx"></script>

        <!-- Firebase Messaging Service Worker -->
        <script>
            if ("serviceWorker" in navigator) {
                navigator.serviceWorker
                    .register("/firebase-messaging-sw.js")
                    .then((registration) => {
                        console.log(
                            "Firebase messaging service worker registered:",
                            registration,
                        );
                    })
                    .catch((error) => {
                        console.error(
                            "Firebase messaging service worker registration failed:",
                            error,
                        );
                    });
            }
        </script>
    </body>
</html>
